<!DOCTYPE html>
<html>
<head>
  <title>Exercise 9.2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<h5>Button Group</h5>

<div class="btn-group mb-4">
  <button class="btn btn-primary">Left</button>
  <button class="btn btn-primary">Middle</button>
  <button class="btn btn-primary">Right</button>
</div>

<h5>Toggle Buttons</h5>

<div class="btn-group" role="group">
  <input type="checkbox" class="btn-check" id="btn1">
  <label class="btn btn-outline-primary" for="btn1">Option 1</label>

  <input type="checkbox" class="btn-check" id="btn2">
  <label class="btn btn-outline-primary" for="btn2">Option 2</label>
</div>

</body>
</html>
