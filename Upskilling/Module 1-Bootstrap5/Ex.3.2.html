<!DOCTYPE html>
<html>

<head>

<title>Container Row Columns</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="row mt-5">

<div class="col bg-info p-3">
Column 1
</div>

<div class="col bg-warning p-3">
Column 2
</div>

<div class="col bg-secondary text-white p-3">
Column 3
</div>

</div>

</div>

</body>

</html>
